<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Register</title>
<head>

<meta charset="UTF-8">

<title>Register</title>

<!-- Google Font -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<!-- Register CSS -->

<link rel="stylesheet"
href="{{ url_for('static', filename='register.css') }}">

</head>

</head>


<body>
<div class="box">

<div class="header">

<div class="logo">
<img src="{{ url_for('static',
filename='lshrk-01.max-500x500.png') }}">
</div>

</div>

<h2>Create a new account</h2>

<p class="subtitle">
It's quick and easy.
</p>

<form method="POST"
action="{{ url_for('signup') }}">

<div class="row">

<div class="col">

<label>First name</label>

<input type="text"
name="first_name"
required>

</div>


<div class="col">

<label>Last name</label>

<input type="text"
name="last_name"
required>

</div>

</div>


<label>Email address</label>

<input type="email"
name="email"
required>


<label>New password</label>

<input type="password"
name="password"
required>


<label>Registration date</label>

<div class="row">

<div class="col">

<input type="text"
name="start_year"
placeholder="Start year"
required>

</div>


<div class="col">

<input type="text"
name="end_year"
placeholder="End year"
required>

</div>

</div>


<button type="submit">

Sign Up

</button>


</form>


</div>

</body>

</html>
