<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Assignment Submissions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='upload_material.css') }}">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f5f7fb;
padding:40px;
}

/* Container */

.container{
max-width:1000px;
margin:auto;
}

/* Title */

h2{
margin-bottom:20px;
color:#333;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 22px rgba(0,0,0,0.06);
}

/* Header */

th{
background:linear-gradient(
90deg,
#6a5cff,
#8b7cff
);

color:white;
padding:16px;
text-align:left;
font-size:14px;
}

/* Rows */

td{
padding:16px;
border-bottom:1px solid #eee;
font-size:14px;
color:#444;
}

/* Alternate rows */

tr:nth-child(even){
background:#fafaff;
}

/* Hover */

tr:hover{
background:#f1f2ff;
transition:.2s;
}

/* Download Button */

.download-btn{

text-decoration:none;

background:linear-gradient(
90deg,
#6a5cff,
#8b7cff
);

color:white;

padding:8px 18px;

border-radius:12px;

font-size:13px;

font-weight:500;

display:inline-flex;

align-items:center;

gap:8px;

transition:.25s;

box-shadow:0 6px 14px rgba(106,92,255,0.25);

}

/* Hover */

.download-btn:hover{

background:linear-gradient(
90deg,
#5a4df0,
#7a6cff
);

transform:translateY(-2px);

box-shadow:0 10px 20px rgba(106,92,255,0.35);

}

/* Empty */

.empty-text{

text-align:center;
padding:20px;
color:#777;

}

</style>

</head>

<body>

<div class="container">

<h2>
📋 Assignment Submissions
</h2>

<table>

<thead>

<tr>

<th>#</th>

<th>Student</th>

<th>Assignment</th>

<th>Course</th>

<th>File</th>

<th>Date</th>

</tr>

</thead>

<tbody>

{% if submissions %}

{% for sub in submissions %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ sub[1] }}</td>

<td>{{ sub[2] }}</td>

<td>{{ sub[4] }}</td>

<td>

<a href="/download/{{ sub[3] }}"
class="download-btn">

<i class="fa-solid fa-download"></i>

Download

</a>

</td>

<td>{{ sub[5] }}</td>

</tr>

{% endfor %}

{% else %}

<tr>

<td colspan="6"
class="empty-text">

No submissions yet

</td>

</tr>

{% endif %}

</tbody>

</table>

</div>

</body>

</html>
