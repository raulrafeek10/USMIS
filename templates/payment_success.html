<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Successful</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{

font-family:'Poppins',sans-serif;

background:linear-gradient(
135deg,
#6c63ff,
#5a52e0
);

height:100vh;

display:flex;

align-items:center;

justify-content:center;

margin:0;

}

.card{

background:white;

padding:40px;

border-radius:18px;

text-align:center;

width:420px;

box-shadow:0 10px 30px rgba(0,0,0,0.15);

animation:fadeIn 0.4s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.icon{

font-size:70px;

color:#22c55e;

margin-bottom:15px;

}

h1{

color:#16a34a;

font-size:24px;

margin-bottom:10px;

}

.transaction{

color:#555;

margin:10px 0;

font-size:14px;

}

.amount{

font-size:22px;

font-weight:600;

color:#6c63ff;

margin:15px 0;

}

button{

margin-top:20px;

padding:12px 22px;

border:none;

border-radius:10px;

background:linear-gradient(
135deg,
#6c63ff,
#5a52e0
);

color:white;

font-size:15px;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 6px 16px rgba(0,0,0,0.2);

}

</style>

</head>

<body>

<div class="card">

<div class="icon">
✅
</div>

<h1>
Payment Successful
</h1>

<div class="transaction">
Transaction ID:
<strong>
{{ transaction_id }}
</strong>
</div>

<div class="amount">
Amount Paid:
{{ amount }} EGP
</div>

<a href="/payment">

<button>

Back to Payment

</button>

</a>

</div>

</body>

</html>
