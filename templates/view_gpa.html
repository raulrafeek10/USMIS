<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>View GPA</title>

<link rel="stylesheet" href="{{ url_for('static', filename='view_gpa.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 class="logo">SAMS</h2>

        <ul class="menu">
            <li>
                <a href="{{ url_for('student_dashboard') }}">
                    <i class="fa fa-home"></i> Dashboard
                </a>
            </li>

            <li class="active">
                <a href="{{ url_for('view_gpa') }}">
                    <i class="fa fa-chart-line"></i> View GPA
                </a>
            </li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">

        <div class="card">

            <h2 class="title">
                <i class="fa fa-graduation-cap"></i>
                Ahmed Ashraf's Grades
            </h2>

            <table class="table">

                <thead>
                    <tr>
                        <th>Course Name</th>
                        <th>Grade</th>
                        <th>Credits</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>DSS</td>
                        <td class="grade-a">A</td>
                        <td>3</td>
                    </tr>

                    <tr>
                        <td>Mobile Computing</td>
                        <td class="grade-aplus">A+</td>
                        <td>2</td>
                    </tr>

                    <!-- 🔥 clickable GIS -->
                    <tr class="clickable" onclick="goGIS()">
                        <td>GIS</td>
                        <td class="grade-a">A</td>
                        <td>3</td>
                    </tr>

                    <tr>
                        <td>English</td>
                        <td class="grade-b">B+</td>
                        <td>2</td>
                    </tr>

                    <tr>
                        <td>ITPM</td>
                        <td class="grade-aplus">A+</td>
                        <td>3</td>
                    </tr>

                    <tr>
                        <td>Data Mining</td>
                        <td class="grade-a">A</td>
                        <td>3</td>
                    </tr>

                </tbody>

            </table>

            <div class="gpa">
                <span>Overall GPA</span>
                <span>3.94</span>
            </div>

        </div>

    </div>

</div>

<script>
function goGIS() {
    window.location.href = "/gis-grades";
}
</script>

</body>
</html>
